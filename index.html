<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>140 Day Learning Tracker</title>
    <link rel="stylesheet" href="./Checklist.css">
    <link rel="scri" href="">
</head>

<body>
    <div class="container">
        <div class="days" id="days"></div>
        <div class="topics">
            <h2 id="title">Select a Day</h2>
            <table class="table table-bordered text-center">
                <tbody>
                    <tr>
                        <th>Angular</th>
                        <td><span id="angular"></span></td>
                    </tr>
                    <tr>
                        <th>.NET</th>
                        <td><span id="dotnet"></span></td>
                    </tr>
                    <tr>
                        <th>SQL</th>
                        <td><span id="sql"></span></td>
                    </tr>
                    <tr>
                        <th>Practice</th>
                        <td><span id="practice"></span></td>
                    </tr>
                </tbody>
            </table>
            <div class="status">
                Status: <span id="status">Not Completed</span>
            </div>
            <button onclick="markComplete()">Mark Completed</button>
        </div>
    </div>
    <script src="./Checklist.js"></script>
</body>

</html>
